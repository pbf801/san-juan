<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Juan 2026 - Pide tu canción</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { color: #ff5722; text-shadow: 0 0 10px #ff5722; animation: latir 2s infinite; }
        .card {
            background: #222;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 87, 34, 0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s;
        }
        input {
            width: 90%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: none; background: #333; color: white;
            font-size: 16px; text-align: center;
        }
        button {
            background: linear-gradient(45deg, #ff5722, #ff9800);
            color: white; border: none; padding: 15px 30px; font-size: 18px;
            border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }
        button:hover { transform: scale(1.05); }
        .estado-box { font-size: 24px; font-weight: bold; margin: 20px 0; color: #4CAF50; }
        .oculto { display: none; }
        @keyframes latir { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCDHfrf1njnrhFuKiqZmPw39lEiXdOEcuc",
          authDomain: "sanjuan-music.firebaseapp.com",
          databaseURL: "https://sanjuan-music-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "sanjuan-music"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Comprobar si ya pidió una canción
        let miCancionId = localStorage.getItem('sanJuanCancionId');

        window.onload = () => {
            if (miCancionId) {
                mostrarPantallaEstado();
                escucharMiCancion();
            }
        };

        window.enviarCancion = function() {
            const nombre = document.getElementById('nombre').value;
            const cancion = document.getElementById('cancion').value;
            
            if(nombre && cancion) {
                const listaRef = ref(db, 'peticiones');
                const nuevaPeticionRef = push(listaRef);
                set(nuevaPeticionRef, { usuario: nombre, tema: cancion, estado: "En cola 🕒" });
                
                // Guardamos su ID secreto en el navegador
                miCancionId = nuevaPeticionRef.key;
                localStorage.setItem('sanJuanCancionId', miCancionId);
                
                mostrarPantallaEstado();
                escucharMiCancion();
            } else {
                alert("¡Eh! Faltan datos 🔥");
            }
        }

        function mostrarPantallaEstado() {
            document.getElementById('form-pedir').classList.add('oculto');
            document.getElementById('pantalla-estado').classList.remove('oculto');
        }

        window.pedirOtra = function() {
            localStorage.removeItem('sanJuanCancionId');
            document.getElementById('pantalla-estado').classList.add('oculto');
            document.getElementById('form-pedir').classList.remove('oculto');
            document.getElementById('cancion').value = "";
        }

        function escucharMiCancion() {
            const miCancionRef = ref(db, 'peticiones/' + miCancionId);
            onValue(miCancionRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const textoEstado = document.getElementById('texto-estado');
                    textoEstado.innerText = data.estado;
                    
                    // Efecto confeti si le toca
                    if(data.estado.includes("escenario") || data.estado.includes("siguiente")) {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                    }
                } else {
                    // Si el DJ la borra, le dejamos pedir otra
                    document.getElementById('texto-estado').innerText = "¡Canción terminada! 🎵";
                }
            });
        }
    </script>
</head>
<body>

    <h1>🔥 Noche de San Juan 🔥</h1>

    <div id="form-pedir" class="card">
        <h3>Pide tu temazo</h3>
        <input type="text" id="nombre" placeholder="Tu Nombre o Apodo">
        <input type="text" id="cancion" placeholder="Canción y Artista">
        <button onclick="enviarCancion()">¡Darle Caña! 🚀</button>
    </div>

    <div id="pantalla-estado" class="card oculto">
        <h3>Estado de tu petición:</h3>
        <div id="texto-estado" class="estado-box">Cargando...</div>
        <button onclick="pedirOtra()" style="background: #555; padding: 10px; font-size: 14px;">Pedir otra canción 🔄</button>
    </div>

</body>
</html>
