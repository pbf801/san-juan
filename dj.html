<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabina del DJ 🎧 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #fff; padding: 30px; margin: 0; }
        h1 { color: #00ffcc; text-transform: uppercase; font-weight: 900; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px;}
        .cancion-card { 
            background: #151515; border-left: 5px solid #00ffcc; padding: 20px; margin-bottom: 15px; 
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px;
        }
        .info h3 { margin: 0 0 5px 0; font-size: 20px; display: flex; align-items: center; justify-content: space-between;}
        .info p { margin: 0; color: #888; font-weight: bold; }
        
        /* El super número para el DJ */
        .num-badge { background: #00ffcc; color: #000; padding: 4px 12px; border-radius: 6px; margin-right: 12px; font-weight: 900; font-size: 22px;}
        
        .botones { display: flex; gap: 8px; flex-wrap: wrap; }
        button { 
            border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; 
            font-family: 'Montserrat'; transition: 0.2s; font-size: 13px; text-transform: uppercase;
        }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        
        .btn-orden { background: #333; color: white; padding: 8px 12px; font-size: 16px;}
        .btn-cola { background: #555; color: white; }
        .btn-sig { background: #ff9800; color: white; }
        .btn-esc { background: #00ffcc; color: black; }
        .btn-no { background: #f44336; color: white; }
        .btn-fin { background: #4CAF50; color: white; }
        .btn-borrar { background: transparent; border: 1px solid #f44336; color: #f44336; margin-left: auto;}
    </style>
    
    <script>
        let pass = prompt("Acceso VIP DJ - Contraseña:");
        if (pass !== "fuego2026") window.location.href = "index.html";
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCDHfrf1njnrhFuKiqZmPw39lEiXdOEcuc",
          authDomain: "sanjuan-music.firebaseapp.com",
          databaseURL: "https://sanjuan-music-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "sanjuan-music"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        let tracksLocales = []; 

        window.cambiarEstado = (id, estado) => update(ref(db, 'peticiones/' + id), { estado });
        window.borrarCancion = (id) => remove(ref(db, 'peticiones/' + id));

        // Nuevo sistema de reordenamiento ANTI-FALLOS
        window.mover = (index, direccion) => {
            if (direccion === 'arriba' && index > 0) {
                let t1 = tracksLocales[index];
                let t2 = tracksLocales[index - 1];
                
                // Actualización simultánea para evitar colisiones en Firebase
                const updates = {};
                updates['peticiones/' + t1.id + '/timestamp'] = t2.timestamp;
                updates['peticiones/' + t2.id + '/timestamp'] = t1.timestamp;
                update(ref(db), updates);
                
            } else if (direccion === 'abajo' && index < tracksLocales.length - 1) {
                let t1 = tracksLocales[index];
                let t2 = tracksLocales[index + 1];

                const updates = {};
                updates['peticiones/' + t1.id + '/timestamp'] = t2.timestamp;
                updates['peticiones/' + t2.id + '/timestamp'] = t1.timestamp;
                update(ref(db), updates);
            }
        };

        onValue(ref(db, 'peticiones'), (snapshot) => {
            const data = snapshot.val();
            const listaDiv = document.getElementById('lista');
            listaDiv.innerHTML = ""; 
            tracksLocales = [];

            if (data) {
                for (let id in data) tracksLocales.push({ id, ...data[id] });
                
                // Ordenar por el timestamp estricto
                tracksLocales.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

                // Lógica Inteligente Auto-Siguiente CORREGIDA
                // 1. Comprobamos si YA HAY alguien con el estado "Siguiente" o "Escenario"
                let haySiguiente = tracksLocales.some(t => t.estado.includes("Siguiente"));
                
                // 2. Si NO hay nadie en "Siguiente", buscamos al primer activo para ponérselo
                if (!haySiguiente) {
                    let primerActivo = tracksLocales.find(t => !t.estado.includes("Finalizado") && !t.estado.includes("No Disponible") && !t.estado.includes("ESCENARIO"));
                    
                    if (primerActivo && primerActivo.estado.includes("En cola")) {
                        cambiarEstado(primerActivo.id, '¡Prepárate! Siguiente 🎤');
                        // No ponemos return para que la interfaz cargue sin parpadear
                    }
                }

                // Renderizamos la lista visual
                tracksLocales.forEach((track, index) => {
                    listaDiv.innerHTML += `
                    <div class="cancion-card">
                        <div class="info">
                            <h3>
                                <span><span class="num-badge">#${index + 1}</span> <i class="fas fa-user-circle"></i> ${track.usuario}</span>
                                <div>
                                    <button class="btn-orden" onclick="mover(${index}, 'arriba')"><i class="fas fa-chevron-up"></i></button>
                                    <button class="btn-orden" onclick="mover(${index}, 'abajo')"><i class="fas fa-chevron-down"></i></button>
                                </div>
                            </h3>
                            <p><i class="fas fa-music"></i> Track: <span style="color:#fff;">${track.tema}</span></p>
                            <p style="margin-top:5px; color:#00ffcc;"><i class="fas fa-broadcast-tower"></i> Estado: ${track.estado}</p>
                        </div>
                        <div class="botones">
                            <button class="btn-cola" onclick="cambiarEstado('${track.id}', 'En cola 🕒')">En Cola</button>
                            <button class="btn-sig" onclick="cambiarEstado('${track.id}', '¡Prepárate! Siguiente 🎤')">Siguiente</button>
                            <button class="btn-esc" onclick="cambiarEstado('${track.id}', '¡AL ESCENARIO! 🔥')">Escenario</button>
                            <button class="btn-no" onclick="cambiarEstado('${track.id}', 'No Disponible ❌ (Pide otra)')">No Disponible</button>
                            <button class="btn-fin" onclick="cambiarEstado('${track.id}', 'Finalizado ✅')">Finalizado</button>
                            
                            <button class="btn-borrar" onclick="borrarCancion('${track.id}')"><i class="fas fa-trash"></i> Borrar</button>
                        </div>
                    </div>`;
                });
            } else {
                listaDiv.innerHTML = "<h3 style='color:#555;'><i class='fas fa-compact-disc fa-spin'></i> La pista de baile está vacía...</h3>";
            }
        });
    </script>
</head>
<body>
    <h1><i class="fas fa-sliders-h"></i> CONTROL ROOM DJ</h1>
    <div id="lista">Conectando con la mesa de mezclas...</div>
</body>
</html>
